name: BOYSER AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check Python files
        run: python -m py_compile agent.py boyser/*.py

      - name: Import and module health check
        run: python -c "import boyser.config, boyser.interrupt, boyser.repl, boyser.tools, boyser.backend, boyser.mcp, boyser.agent, boyser.subagent; n=len(boyser.config.TOOLS); print('All '+str(n)+' tools loaded OK')"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded API keys and tokens
        run: |
          set +e
          found=0
          patterns=(
            'ghp_[A-Za-z0-9]{36}'
            'gho_[A-Za-z0-9]{36}'
            'ghu_[A-Za-z0-9]{36}'
            'sk-ant-[A-Za-z0-9]{32,64}'
            'sk-or-[A-Za-z0-9]{32,64}'
            'sk-[A-Za-z0-9]{20,64}'
            "api[_-]key['\"']?\\s*[:=]\\s*['\"']"
            "api[_-]secret['\"']?\\s*[:=]\\s*['\"']"
          )
          for pat in "${patterns[@]}"; do
            matches=$(grep -rnE "$pat" \
              --include='*.py' --include='*.sh' --include='*.json' \
              --include='*.yaml' --include='*.yml' --include='*.env' \
              --include='*.cfg' --include='*.ini' --include='*.toml' . \
              2>/dev/null \
              | grep -v '.git/' \
              | grep -v 'node_modules/' \
              | grep -v '__pycache__/' \
              | grep -v '.github/workflows/ci.yml')
            if [ -n "$matches" ]; then
              echo "::warning::Potential secret found matching pattern: $pat"
              echo "$matches"
              found=$((found + 1))
            fi
          done
          if [ $found -gt 0 ]; then
            echo "::error::Hardcoded API keys/tokens detected! Found $found pattern matches."
            exit 1
          else
            echo "No hardcoded API keys or tokens detected."
          fi
